- name: "[2/5] Init Sing-box Proxy Engine"
        run: |
          echo -e "\033[36m[INFO]\033[0m 获取 sing-box 最新稳定版本..."
          # 从官方 GitHub 仓库直接拉取原生内核，绝对不走未知第三方脚本
          LATEST_URL=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep "browser_download_url.*linux-amd64.tar.gz" | cut -d '"' -f 4)
          wget -qO sing-box.tar.gz "$LATEST_URL"
          tar -xzf sing-box.tar.gz
          BIN_PATH=$(find . -maxdepth 2 -type f -name "sing-box" | head -n 1)
          chmod +x "$BIN_PATH" && sudo mv "$BIN_PATH" /usr/local/bin/sing-box
          
          echo -e "\033[36m[INFO]\033[0m 最新稳定版本: \033[1m$(sing-box version | head -n 1 | awk '{print $3}')\033[0m"
          echo -e "\033[36m[INFO]\033[0m 协议: \033[1mvless\033[0m"
          
          # 1. 先将 GitHub Secrets 中的原始 JSON 写入临时文件
          cat << 'EOF' > /tmp/config_raw.json
          ${{ secrets.VLESS_CONFIG_JSON }}
          EOF
          
          # ==================== 核心自动清洗点 ====================
          # 2. 使用 jq 自动剔除不兼容的 "log" 字段（解决 loglevel 报错），生成标准合法配置
          jq 'del(.log)' /tmp/config_raw.json > /tmp/config.json
          echo -e "\033[32m[INFO] ✅ sing-box 配置已清洗并生成\033[0m"
          # ===================================================
          
          # 清理旧进程
          sudo killall sing-box xray 2>/dev/null || true
          
          # 3. 开启兼容旧版 DNS 格式的环境变量
          export ENABLE_DEPRECATED_LEGACY_DNS_SERVERS=true
          nohup sing-box run -c /tmp/config.json > /tmp/sing-box.log 2>&1 &
          
          sleep 3
          echo "🟢 sing-box 代理引擎后台启动完毕！"
