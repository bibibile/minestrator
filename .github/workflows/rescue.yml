name: "Minestrator VLESS Auto Rescue"

on:
  repository_dispatch:
    types: [server-offline]
  workflow_dispatch:

jobs:
  rescue:
    runs-on: ubuntu-latest
    steps:
      - name: "[1/5] Print Alert Info"
        run: |
          echo "⚠️ 接收到 Uptime Kuma 宕机报警或手动触发！准备启动 VLESS 代理隧道..."
          echo "受影响服务器 ID: ${{ github.event.client_payload.server_id || '464225' }}"

      - name: "[2/5] Init Xray-core Proxy Engine"
        run: |
          echo -e "\033[36m[INFO]\033[0m 获取 Xray-core 最新原生稳定稳定内核..."
          # 1. 直接从官方拉取最新 Xray-core，100% 完美兼容您导出的 VLESS_CONFIG_JSON
          LATEST_URL=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep "browser_download_url.*Xray-linux-64.zip" | cut -d '"' -f 4)
          wget -qO xray.zip "$LATEST_URL"
          unzip -q xray.zip -d ./xray-bin
          chmod +x ./xray-bin/xray && sudo mv ./xray-bin/xray /usr/local/bin/xray
          
          echo -e "\033[36m[INFO]\033[0m 内核版本: \033[1m$(xray version | head -n 1)\033[0m"
          echo -e "\033[36m[INFO]\033[0m 协议: \033[1mvless (Xray 原生格式)\033[0m"
          
          # 2. 原封不动地写入您的配置，无需任何 jq 删改或兼容环境变量！
          cat << 'EOF' > /tmp/config.json
          ${{ secrets.VLESS_CONFIG_JSON }}
          EOF
          echo -e "\033[32m[INFO] ✅ 配置文件已生成\033[0m"
          
          # 3. 清理旧进程并在后台启动 Xray
          sudo killall sing-box xray 2>/dev/null || true
          nohup xray run -c /tmp/config.json > /tmp/xray.log 2>&1 &
          sleep 3
          echo "🟢 Xray 代理引擎后台启动完毕！"

      - name: "[3/5] Test VLESS Proxy IP"
        run: |
          echo "🔍 正在测试本地 HTTP 代理 (127.0.0.1:10809) 是否能够正常出国..."
          # 加上 || true 防止请求超时直接导致脚本中断，确保排错日志输出
          PROXY_IP=$(curl -s --max-time 10 -x http://127.0.0.1:10809 https://ifconfig.me || true)
          
          # 如果 HTTP 端口未响应，智能回退尝试 SOCKS5 10808 端口
          if [ -z "$PROXY_IP" ]; then
            echo "ℹ️ HTTP (10809) 代理未响应，正在尝试 SOCKS5 (10808) 端口..."
            PROXY_IP=$(curl -s --max-time 10 -x socks5://127.0.0.1:10808 https://ifconfig.me || true)
          fi
          
          if [ -z "$PROXY_IP" ]; then
            echo -e "\033[31m[ERROR] ❌ 代理连接彻底失败！打印 Xray 运行日志：\033[0m"
            cat /tmp/xray.log
            exit 1
          else
            echo -e "\033[32m[INFO] 🎉 代理连接成功！当前 VLESS 节点出口 IP 为: $PROXY_IP\033[0m"
          fi

      - name: "[4/5] Check Server Realtime Status (Prevent False Alarm)"
        run: |
          echo "🔍 正在向后台 API 查询服务器实时运行状态..."
          
          # 优先尝试 http 代理，如果需要也可改为 socks5
          STATUS_RESPONSE=$(curl -s --max-time 15 \
            -x http://127.0.0.1:10809 \
            -X GET "https://mine.sttr.io/server/${{ github.event.client_payload.server_id || '464225' }}" \
            -H "Authorization: Bearer ${{ secrets.MINE_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" || true)
            
          echo "API 返回状态片段: $(echo $STATUS_RESPONSE | cut -c 1-150)..."
          
          # 核心防误触：如果服务器当前是 running / online 状态，说明只断了反代隧道，停止发包
          if echo "$STATUS_RESPONSE" | grep -iE '"status":\s*"(started|running|online)"|"can_stop":\s*true' > /dev/null; then
            echo "🛑 【拦截生效】API 显示服务器当前处于可 Stop / 在线运行状态！"
            echo "ℹ️ 诊断结果：仅仅是外网反代/隧道链接失联，服务端主进程完好。"
            echo "🛡️ 为避免误伤在线玩家，脚本主动放弃发送 restart 指令，安全退出！"
            exit 0
          fi
          echo "⚠️ 确认服务器本体已离线/休眠，准备进入发包重启流程！"

      - name: "[5/5] Send Restart Command via VLESS"
        run: |
          echo "🔄 正在通过 VLESS 节点向 Minestrator 核心服务器 (mine.sttr.io) 发送重启命令..."
          
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -x http://127.0.0.1:10809 \
            -X POST "https://mine.sttr.io/server/${{ github.event.client_payload.server_id || '464225' }}/restart" \
            -H "Authorization: Bearer ${{ secrets.MINE_BEARER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"action": "restart"}' || true)
            
          echo "收到目标服务器返回状态码: $RESPONSE_CODE"
          
          if [ "$RESPONSE_CODE" -eq 200 ] || [ "$RESPONSE_CODE" -eq 201 ] || [ "$RESPONSE_CODE" -eq 204 ]; then
            echo "🎉 ✅ 重启指令已通过 VLESS 节点成功发出！云端自救完成。"
          else
            echo "❌ 失败：服务器返回异常状态码 $RESPONSE_CODE"
            exit 1
          fi
